<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#030712">
    <title>Kardly - Çevrimdışı</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #030712;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            color: white;
            padding: 24px;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glows */
        .bg-glow-1 {
            position: fixed;
            top: -20%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(255,59,107,0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: float1 15s ease-in-out infinite;
            pointer-events: none;
        }
        .bg-glow-2 {
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%);
            border-radius: 50%;
            animation: float2 20s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 20px) scale(1.1); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, -30px) scale(1.15); }
        }

        .container {
            text-align: center;
            max-width: 380px;
            position: relative;
            z-index: 10;
        }

        /* Premium Card */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 2rem;
            padding: 40px 32px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 25px 80px -20px rgba(0,0,0,0.5);
        }

        .icon-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(255,59,107,0.15), rgba(255,107,138,0.08));
            border: 1px solid rgba(255,59,107,0.15);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            position: relative;
        }

        .icon-wrapper::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 1.8rem;
            border: 1px solid rgba(255,59,107,0.06);
        }

        .wifi-icon {
            width: 36px;
            height: 36px;
            opacity: 0.6;
        }

        h1 {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff, rgba(255,255,255,0.7));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            line-height: 1.7;
            margin-bottom: 28px;
            font-weight: 500;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #FF3B6B, #FF6B8A);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 1rem;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 40px -10px rgba(255,59,107,0.3);
            position: relative;
            overflow: hidden;
            width: 100%;
            justify-content: center;
        }

        .btn:hover { 
            transform: translateY(-2px) scale(1.02); 
            box-shadow: 0 20px 50px -10px rgba(255,59,107,0.4);
        }
        .btn:active { 
            transform: translateY(0) scale(0.98); 
        }

        .btn .shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: btnShine 3s ease-in-out infinite;
        }

        @keyframes btnShine {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .btn svg {
            width: 16px;
            height: 16px;
        }

        /* Status Indicator */
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.2);
            font-weight: 700;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: #f59e0b;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 10px rgba(245,158,11,0.4);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(1); box-shadow: 0 0 10px rgba(245,158,11,0.2); }
            50% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 20px rgba(245,158,11,0.5); }
        }

        /* Reconnected state */
        .reconnected .pulse-dot {
            background: #10b981;
            box-shadow: 0 0 10px rgba(16,185,129,0.4);
        }

        /* Subtle grid */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    <div class="grid-bg"></div>
    
    <div class="container">
        <div class="card">
            <div class="icon-wrapper">
                <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="rgba(255,59,107,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
                    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
                    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
                    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                    <line x1="12" y1="20" x2="12.01" y2="20"></line>
                </svg>
            </div>
            
            <h1>Çevrimdışısınız</h1>
            <p class="subtitle">
                İnternet bağlantınız kesildi. Bağlantı sağlandığında otomatik olarak yenilenecektir.
            </p>
            
            <button class="btn" onclick="window.location.reload()">
                <span class="shine"></span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                Tekrar Dene
            </button>
            
            <div class="status" id="statusIndicator">
                <div class="pulse-dot"></div>
                <span id="statusText">Bağlantı bekleniyor</span>
            </div>
        </div>
    </div>

    <script>
        // Auto-retry when back online
        window.addEventListener('online', () => {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            indicator.classList.add('reconnected');
            text.textContent = 'Bağlantı sağlandı ✓';
            setTimeout(() => window.location.reload(), 1000);
        });

        // Periodic check
        let checkCount = 0;
        const statusText = document.getElementById('statusText');
        setInterval(() => {
            checkCount++;
            const dots = '.'.repeat((checkCount % 3) + 1);
            if (!navigator.onLine) {
                statusText.textContent = 'Bağlantı bekleniyor' + dots;
            }
        }, 1500);
    </script>
</body>
</html>
